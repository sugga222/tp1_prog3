<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agus y Manu | Contacto</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Ir al inicio">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Agus y Manu</span>
        </a>

        <nav class="site-nav" aria-label="Navegación principal">
          <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./servicios.html">Servicios</a></li>
            <li><a href="./equipo.html">Equipo</a></li>
            <li><a href="./pedido.html">Pedido</a></li>
            <li><a href="./contacto.html" aria-current="page">Contacto</a></li>
            <li><a href="./faq.html">FAQ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="contenido">
      <div class="container">
        <section class="section">
          <h2>Contacto</h2>
          <p class="lead">Dejanos un mensaje y respondemos por el canal que prefieras.</p>

          <form action="#" method="post" aria-label="Formulario de contacto">
            <div class="form-grid">
              <div class="field">
                <label for="nombre">Nombre</label>
                <input id="nombre" name="nombre" type="text" required />
              </div>

              <div class="field">
                <label for="apellido">Apellido</label>
                <input id="apellido" name="apellido" type="text" required />
              </div>

              <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
              </div>

              <div class="field full">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" required></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn primary" type="submit">Enviar</button>
              <button class="btn secondary" type="reset">Reset</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>© 2026 Agus y Manu — TP1 Prog III</small>
        <small><a href="./index.html">Volver al inicio</a></small>
      </div>
    </footer>
  </body>
</html>
